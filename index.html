<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB CS 2027 Assessment Builder Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .exam-font { font-family: 'Noto Serif', serif; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Writing Lines Style */
        .writing-line {
            border-bottom: 1px solid #d1d5db;
            height: 2rem;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            .tab-content { display: block !important; }
            #tab-library { display: none !important; }
            .page-break { page-break-before: always; }
            .exam-container { padding: 0 !important; max-width: 100% !important; }
            header, .controls { display: none !important; }
        }

        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center no-print shrink-0 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 leading-tight">IB CS 2027</h1>
                    <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Assessment Creator</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="switchTab('library')" id="btn-library" class="px-5 py-2 rounded-lg text-sm font-semibold transition-all bg-white shadow-sm text-blue-600">Library</button>
                    <button onclick="switchTab('preview')" id="btn-preview" class="px-5 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:text-slate-900 relative">
                        Assessment
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white hidden">0</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-hidden flex flex-col">
            
            <!-- Library View -->
            <div id="tab-library" class="tab-content active h-full flex flex-col overflow-hidden">
                <!-- Toolbar -->
                <div class="bg-white border-b border-slate-200 p-4 px-8 flex flex-wrap gap-4 items-center no-print">
                    <div class="relative inline-block text-left group">
                        <label class="text-xs font-bold text-slate-400 uppercase block mb-1">Filter by Theme</label>
                        <select id="topic-select" onchange="filterByTopic(this.value)" class="block w-64 bg-slate-50 border border-slate-200 text-slate-700 py-2 px-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">All Syllabus Topics</option>
                            <option value="A1">Theme A1: Hardware & Operation</option>
                            <option value="A2">Theme A2: Networks & Web</option>
                            <option value="A3">Theme A3: Databases</option>
                            <option value="A4">Theme A4: Machine Learning</option>
                            <option value="B1">Theme B1: Computational Thinking</option>
                            <option value="B2">Theme B2: Data Structures</option>
                            <option value="B3">Theme B3: OOP</option>
                            <option value="B4">Theme B4: Control Systems</option>
                        </select>
                    </div>
                    <div class="ml-auto flex gap-2">
                        <span class="text-sm text-slate-400 self-center">Showing <span id="visible-count" class="font-bold text-slate-700">0</span> questions</span>
                    </div>
                </div>

                <!-- Scrollable Grid -->
                <div class="flex-1 overflow-y-auto p-8">
                    <div id="question-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Questions JS -->
                    </div>
                </div>
            </div>

            <!-- Preview View -->
            <div id="tab-preview" class="tab-content h-full overflow-y-auto bg-slate-200 py-8 px-4 no-scrollbar">
                <div class="max-w-[210mm] mx-auto">
                    <!-- Internal Controls -->
                    <div class="flex justify-between items-center mb-6 no-print bg-white p-4 rounded-xl shadow-sm border border-slate-300">
                        <div class="flex gap-2">
                            <button onclick="window.print()" class="bg-slate-900 text-white px-5 py-2.5 rounded-lg hover:bg-black font-bold flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                Save as PDF / Print
                            </button>
                            <button onclick="toggleMarkscheme()" id="toggle-ms" class="bg-blue-50 text-blue-700 px-5 py-2.5 rounded-lg hover:bg-blue-100 font-bold">
                                Show Markscheme
                            </button>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="clearAssessment()" class="text-slate-400 hover:text-red-600 font-bold text-sm">Clear Paper</button>
                            <div class="h-8 w-[1px] bg-slate-200"></div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400 uppercase font-black">Total Marks</p>
                                <p id="total-marks" class="text-2xl font-black text-slate-900">0</p>
                            </div>
                        </div>
                    </div>

                    <!-- The Exam Paper -->
                    <div id="paper-content" class="bg-white p-[20mm] shadow-xl min-h-[297mm] exam-font text-slate-900">
                        <div class="border-b-4 border-black pb-4 mb-8">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h2 class="text-2xl font-bold tracking-tighter">COMPUTER SCIENCE</h2>
                                    <h3 class="text-lg font-bold">CORE & HIGHER LEVEL</h3>
                                    <p class="text-sm italic mt-1">Mock Examination - 2027 Syllabus</p>
                                </div>
                                <div class="text-right border-2 border-black p-2 px-4">
                                    <p class="text-xs font-bold uppercase">Candidate Number</p>
                                    <div class="h-6 w-32 border-b border-black mt-2"></div>
                                </div>
                            </div>
                        </div>

                        <div id="paper-questions" class="space-y-10">
                            <!-- Selected questions JS -->
                        </div>

                        <!-- Markscheme Page -->
                        <div id="ms-container" class="mt-16 hidden pt-12 border-t-4 border-slate-900 page-break">
                            <h2 class="text-3xl font-black mb-8 underline uppercase">Markscheme</h2>
                            <div id="ms-questions" class="space-y-8"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const questionData = [
            { id: 1, cat: 'A1.1', text: "Identify the part of the CPU that performs logical comparisons.", marks: 1, ans: "Arithmetic Logic Unit (ALU)." },
            { id: 2, cat: 'A1.1', text: "Explain the role of the Memory Data Register (MDR) in the fetch-execute cycle.", marks: 3, ans: "Holds the data/instruction fetched from memory [1]; or data waiting to be written [1]; acts as a buffer between memory and CPU [1]." },
            { id: 3, cat: 'A1.1', text: "Outline the function of the Program Counter (PC).", marks: 2, ans: "Holds the memory address [1] of the next instruction to be fetched [1]." },
            { id: 4, cat: 'A1.1', text: "Describe how the address bus and data bus are used when the CPU fetches an instruction.", marks: 4, ans: "Address bus carries location [1]; Data bus carries content [1]; Coordinated by CU [1]; Unidirectional vs Bidirectional [1]." },
            { id: 11, cat: 'A1.3', text: "Convert the decimal value -25 into 8-bit Two’s Complement. Show your working.", marks: 3, ans: "25=00011001 [1]. Invert: 11100110 [1]. Add 1: 11100111 [1]." },
            { id: 18, cat: 'A2.2', text: "Discuss the social and ethical issues of the 'Internet of Things' (IoT) in a domestic setting.", marks: 6, ans: "Security/Privacy risks (unauthorized access) [2]. Data volume issues (storage/analysis) [2]. Interoperability vs environmental sustainability [2]." },
            { id: 26, cat: 'A3.1', text: "Explain the goals of 1st, 2nd, and 3rd Normal Form in database design.", marks: 6, ans: "1NF: Atomic values/No repeating groups [2]. 2NF: No partial dependency on primary key [2]. 3NF: No transitive dependency [2]." },
            { id: 29, cat: 'A4.1', text: "Distinguish between Supervised and Unsupervised Learning techniques.", marks: 3, ans: "Supervised uses labeled datasets with target outputs [1.5]. Unsupervised finds hidden patterns or structures in unlabeled data [1.5]." },
            { id: 32, cat: 'B1.1', text: "Define the terms 'Abstraction' and 'Decomposition' in the context of computational thinking.", marks: 4, ans: "Abstraction: Removing unnecessary details to focus on essential features [2]. Decomposition: Breaking a complex problem into smaller, manageable sub-problems [2]." },
            { id: 36, cat: 'B2.2', text: "Describe the stack operations Push, Pop, and Peek.", marks: 3, ans: "Push: Adds element to top [1]. Pop: Removes top element [1]. Peek: Returns top element without removing it [1]." },
            { id: 45, cat: 'B4.1', text: "Explain the role of a 'Feedback Loop' in a closed-loop automated system.", marks: 3, ans: "Sensor reads current state [1]. Processor compares reading to set point [1]. Actuator makes adjustments to reduce error [1]." }
        ];

        let cart = [];
        let showMarkscheme = false;

        function renderQuestions(filter = '') {
            const container = document.getElementById('question-container');
            container.innerHTML = '';
            
            const filtered = filter ? questionData.filter(q => q.cat.startsWith(filter)) : questionData;
            document.getElementById('visible-count').innerText = filtered.length;

            filtered.forEach(q => {
                const inCart = cart.find(item => item.id === q.id);
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl border ${inCart ? 'border-blue-500 ring-4 ring-blue-50' : 'border-slate-200'} transition-all hover:shadow-md">
                        <div class="flex justify-between items-center mb-3">
                            <span class="px-2 py-1 rounded bg-slate-100 text-slate-500 text-[10px] font-black uppercase tracking-widest">${q.cat}</span>
                            <span class="text-xs font-bold text-slate-400">${q.marks} Marks</span>
                        </div>
                        <p class="text-slate-800 font-medium mb-6 min-h-[3rem] line-clamp-3">${q.text}</p>
                        <button onclick="toggleCart(${q.id})" 
                                class="w-full py-2.5 rounded-xl font-bold transition-all ${inCart ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-blue-600 text-white hover:bg-blue-700'}">
                            ${inCart ? 'Remove' : 'Add to Assessment'}
                        </button>
                    </div>
                `;
            });
        }

        function toggleCart(id) {
            const index = cart.findIndex(q => q.id === id);
            if (index > -1) cart.splice(index, 1);
            else cart.push(questionData.find(q => q.id === id));
            
            updateUI();
        }

        function updateUI() {
            const countEl = document.getElementById('cart-count');
            countEl.innerText = cart.length;
            countEl.classList.toggle('hidden', cart.length === 0);
            
            document.getElementById('total-marks').innerText = cart.reduce((acc, q) => acc + q.marks, 0);
            
            renderQuestions(document.getElementById('topic-select').value);
            renderAssessment();
        }

        function renderAssessment() {
            const paper = document.getElementById('paper-questions');
            const ms = document.getElementById('ms-questions');
            paper.innerHTML = '';
            ms.innerHTML = '';

            if (cart.length === 0) {
                paper.innerHTML = `<div class="text-center py-20 text-slate-300">
                    <p class="text-xl font-bold">Your assessment is empty.</p>
                    <p>Select questions from the library to populate this paper.</p>
                </div>`;
                return;
            }

            cart.forEach((q, i) => {
                // Paper View
                // Providing roughly 2 lines per mark + 1 extra line
                const lineCount = (q.marks * 2) + 1;
                paper.innerHTML += `
                    <div class="relative">
                        <div class="flex justify-between font-bold mb-2">
                            <span>Question ${i + 1}</span>
                            <span>[${q.marks}]</span>
                        </div>
                        <p class="text-lg leading-snug mb-4">${q.text}</p>
                        <div class="writing-space mb-8">
                            ${Array(lineCount).fill('<div class="writing-line"></div>').join('')}
                        </div>
                    </div>
                `;

                // MS View
                ms.innerHTML += `
                    <div class="border-l-4 border-slate-900 pl-6 py-2">
                        <div class="flex justify-between font-bold text-lg mb-2">
                            <span>Question ${i + 1}</span>
                            <span>Total Marks: ${q.marks}</span>
                        </div>
                        <p class="text-slate-700 italic bg-slate-50 p-4 rounded">${q.ans}</p>
                    </div>
                `;
            });
        }

        function filterByTopic(val) {
            renderQuestions(val);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            const isLib = tab === 'library';
            const libBtn = document.getElementById('btn-library');
            const preBtn = document.getElementById('btn-preview');
            
            libBtn.className = `px-5 py-2 rounded-lg text-sm font-semibold transition-all ${isLib ? 'bg-white shadow-sm text-blue-600' : 'text-slate-600 hover:text-slate-900'}`;
            preBtn.className = `px-5 py-2 rounded-lg text-sm font-semibold transition-all ${!isLib ? 'bg-white shadow-sm text-blue-600' : 'text-slate-600 hover:text-slate-900'} relative`;
        }

        function toggleMarkscheme() {
            showMarkscheme = !showMarkscheme;
            document.getElementById('ms-container').classList.toggle('hidden', !showMarkscheme);
            document.getElementById('toggle-ms').innerText = showMarkscheme ? "Hide Markscheme" : "Show Markscheme";
        }

        function clearAssessment() {
            if (confirm('Are you sure you want to clear the current assessment?')) {
                cart = [];
                updateUI();
            }
        }

        // Initialize
        renderQuestions();
    </script>
</body>
</html>
